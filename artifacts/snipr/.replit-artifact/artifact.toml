kind = "web"
previewPath = "/"
title = "Snipr"
version = "1.0.0"
id = "artifacts/snipr"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3000

[services.development]
run = "pnpm --filter @workspace/snipr run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/snipr", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/snipr", "run", "start" ]

[services.env]
PORT = "3000"
